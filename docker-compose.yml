version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_direcional
    environment:
      SA_PASSWORD: "Dev@Direcional#2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - direcional-network

  api:
    build:
      context: ./backend/Direcional.Api/Direcional.Api
      dockerfile: Dockerfile
    container_name: direcional_api
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    networks:
      - direcional-network

volumes:
  sql_data:

networks:
  direcional-network:
    driver: bridge